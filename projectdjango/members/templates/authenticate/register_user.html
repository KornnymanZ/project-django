{% extends 'base.html' %}
{% load socialaccount %}
{% block content %}

{% if form.errors %}
<div class="alert alert-warning alert-dismissible fade show" role="alert">
    An error occurred during registration.
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 rounded-4 p-5 text-center bg-body-tertiary"
        style="max-width: 450px; width: 100%;">
        <div class="mb-4">
            <h2 class="fw-bold mb-3">Join the Team</h2>
            <p class="text-muted">Create your account with University Email</p>
        </div>

        <div class="d-grid gap-3 mt-4 mb-4">
            <a href="{% provider_login_url 'google' %}"
                class="btn btn-outline-secondary bg-body rounded-pill py-3 d-flex align-items-center justify-content-center fw-bold transition-hover fs-5">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo"
                    style="width: 24px; height: 24px; margin-right: 12px;">
                Sign up with Google
            </a>
        </div>

        <p class="text-muted mt-3 mb-0">Already have an account? <a href="{% url 'login' %}"
                class="text-decoration-none fw-bold text-primary">Log In</a></p>
    </div>
</div>

{% endblock %}
